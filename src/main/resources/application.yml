spring:
  application:
    name: pet360

  datasource:
    url: jdbc:h2:mem:pet360;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: true

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

  cache:
    type: simple
    cache-names: pets,tutores,clinicas,consultas,vacinas,medicamentos,agendamentos,alertas

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

pet360:
  jwt:
    secret: "Y2hhbGxlbmdlLWZpYXAtcGV0MzYwLWFkdmFuY2VkLWphdmEtMjAyNi1zZWNyZXQta2V5LXdpdGgtMjU2LWJpdHM="
    expiration-ms: 86400000
  cors:
    allowed-origins: "*"

logging:
  level:
    root: INFO
    br.com.fiap.pet360: DEBUG
    org.hibernate.SQL: DEBUG
